<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="container mt-3 mb-2">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h1 class="mb-0"><strong>Base Gym</strong></h1>
            </div>
            <div class="col-md-6">
                <form class="d-flex float-md-end">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-dark" type="submit">Search</button>
                </form>
            </div>
        </div>
    </header>

    <hr class="m-0">

    <nav class="container my-2">
        <ul class="nav">
            <li class="nav-item">
                <a class="nav-link text-dark" href="index.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-dark" href="about.html">About Us</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-dark" href="gallery.html">Gallery</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-dark" href="contact.html">Contact</a>
            </li>
        </ul>
    </nav>

    <hr class="m-0 mb-5">

    <section class="container mb-5">
        <div class="row">
            
            <div class="col-md-5 mb-4 mb-md-0">
                <h3 class="mb-4">Order Summary</h3>
                <div class="card border-dark">
                    <div class="card-body">
                        <h4 class="card-title fw-bold">Premium Plan</h4>
                        <p class="card-text text-muted">Billed monthly. Cancel anytime.</p>
                        <hr class="border-dark">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold">Total Due Today:</span>
                            <span class="fw-bold">P500.00</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-7">
                <h3 class="mb-4">Payment Details</h3>
                <div class="card border-dark">
                    <div class="card-body">
                        <form action="#" method="POST">
                            
                            <div class="mb-3">
                                <label for="cardName" class="form-label">Name on Card</label>
                                <input type="text" class="form-control border-dark" id="cardName" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Receipt To</label>
                                <input type="email" class="form-control border-dark" id="email" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="cardNumber" class="form-label">Card Number</label>
                                <input type="text" class="form-control border-dark" id="cardNumber" placeholder="XXXX XXXX XXXX XXXX" maxlength="16" required>
                            </div>
                            
                            <div class="row">
                                <div class="col-6 mb-4">
                                    <label for="expiry" class="form-label">Expiry Date</label>
                                    <input type="text" class="form-control border-dark" id="expiry" placeholder="MM/YY" maxlength="5" required>
                                </div>
                                <div class="col-6 mb-4">
                                    <label for="cvv" class="form-label">CVV</label>
                                    <input type="password" class="form-control border-dark" id="cvv" placeholder="123" maxlength="3" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-dark w-100 fw-bold">Confirm Payment</button>
                            
                        </form>
                    </div>
                </div>
            </div>
            
        </div>
    </section>

    <footer class="bg-light py-4 border-top mt-5">
        <div class="container text-center mb-4">
            <div class="row">
                <div class="col-md-6 border-end border-dark">
                    <p class="mb-0 fw-bold">Contact: +267 71807052</p>
                </div>
                <div class="col-md-6">
                    <p class="mb-0 fw-bold">Email: support@basegym.co.bw</p>
                </div>
            </div>
        </div>
        
        <div class="container text-center">
            <p class="mb-0 small fw-bold">Copyright @Yash</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
